name: CI - Integracao Continua (Qualidade de Codigo)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias de teste (Flake8)
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Analisar a qualidade do codigo (Lint)
      run: |
        # Para a execucao se houver erros criticos de sintaxe do Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics